<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рационални неравенства - контролна работа</title>
    
    <!-- KaTeX за ултра-бързо и надеждно рендиране на формулите -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- html2pdf за директно сваляне на документа като PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary-color: #1a252f;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --accent-color: #c0392b;
            --bg-color: #e9ecef;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        select, button, input[type="text"] {
            padding: 10px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: 0.2s;
        }

        select, input[type="text"] {
            background-color: #f1f2f6;
            color: #2f3640;
            border: 1px solid #dcdde1;
            font-weight: bold;
        }

        input[type="text"] {
            cursor: text;
            width: 200px;
            font-weight: normal;
        }

        button {
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        #btn-generate { background-color: var(--secondary-color); }
        #btn-pdf { background-color: var(--accent-color); }

        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:disabled { background: #95a5a6; cursor: not-allowed; transform: none; }

        .paper {
            background: white;
            width: 100%;
            max-width: 820px;
            padding: 30px 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 5px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #1a252f;
        }

        .header h1 {
            margin: 0 0 5px 0;
            font-size: 24px;
            color: var(--primary-color);
        }

        .header h2.subtitle {
            margin: 0 0 10px 0;
            color: #555;
            font-size: 18px;
            font-weight: normal;
            font-style: italic;
        }

        .header p {
            margin: 0;
            color: #555;
            font-size: 15px;
        }

        .short-tasks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 30px;
            margin-bottom: 15px;
        }

        .long-tasks-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task {
            display: block;
            border-bottom: 1px dashed #ecf0f1;
            padding-bottom: 8px;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .task-title { font-weight: bold; color: var(--primary-color); }
        
        .points { font-weight: bold; color: var(--accent-color); font-size: 0.9em; }
        .points.bonus { color: var(--success-color); }

        .math-content {
            text-align: center;
            font-size: 1.15em;
            margin: 5px 0;
            min-height: 35px;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .variant-answers {
            background: #f8f9fa;
            border: 1px solid #dcdde1;
            padding: 15px;
            border-radius: 6px;
        }

        .variant-answers h3 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
            text-align: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        .variant-answers ol {
            margin: 0;
            padding-left: 20px;
            font-size: 0.95em;
        }

        .variant-answers li {
            margin-bottom: 8px;
            padding-left: 5px;
        }

        .page-break {
            page-break-before: always;
            margin-top: 40px;
            border-top: 2px dashed #bdc3c7;
            padding-top: 20px;
        }

        @media print {
            body { background: white; padding: 0; }
            .controls { display: none; }
            .paper { box-shadow: none; border: none; padding: 0; max-width: 100%; border-radius: 0; }
            .task { page-break-inside: avoid; }
            .page-break { border: none; margin-top: 0; padding-top: 0; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label for="subtitle-input" style="font-weight: bold; margin-right: 5px;">Подзаглавие:</label>
        <input type="text" id="subtitle-input" value="контролна работа" placeholder="напр. тест, класно...">

        <label for="variant-count" style="font-weight: bold; margin-left: 10px; margin-right: 5px;">Брой варианти:</label>
        <select id="variant-count">
            <option value="1">1 Вариант</option>
            <option value="2" selected>2 Варианта</option>
            <option value="4">4 Варианта</option>
            <option value="6">6 Варианта</option>
        </select>
        
        <label style="font-weight: bold; margin-left: 10px; margin-right: 10px; display: flex; align-items: center; cursor: pointer; color: var(--primary-color);">
            <input type="checkbox" id="include-bonus" checked style="margin-right: 5px; width: 18px; height: 18px; cursor: pointer;">
            Включи Бонус
        </label>

        <button id="btn-generate" onclick="generateTest()">🔄 Генерирай</button>
        <button id="btn-pdf" onclick="downloadPDF()">📄 Изтегли като PDF</button>
    </div>

    <!-- Този контейнер ще бъде запазен като PDF -->
    <div id="paper-content" class="paper">
        <div id="test-container">
            <p style="text-align: center; color: #666;">Зареждане...</p>
        </div>
    </div>

    <script>
        // Функция за разбъркване на масив (тесте с карти)
        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId];
                array[curId] = array[randId];
                array[randId] = tmp;
            }
            return array;
        }

        // Помощни функции за динамично генериране на квадратните неравенства
        function flipOp(op) {
            if (op === "\\le 0") return "\\ge 0";
            if (op === "\\ge 0") return "\\le 0";
            if (op === "< 0") return "> 0";
            if (op === "> 0") return "< 0";
            return op;
        }

        function formatTerm(c, p, isFirst) {
            if (c === 0) return "";
            let sign = "";
            if (c < 0) {
                sign = isFirst ? "-" : " - ";
            } else if (!isFirst) {
                sign = " + ";
            }

            let absC = Math.abs(c);
            let numStr = (absC === 1 && p > 0) ? "" : absC.toString();
            let varStr = p === 2 ? "x^2" : (p === 1 ? "x" : "");

            return sign + numStr + varStr;
        }

        function buildQuadratic(a, b, c, op, isNegative, isUnordered) {
            let curA = isNegative ? -a : a;
            let curB = isNegative ? -b : b;
            let curC = isNegative ? -c : c;
            let curOp = isNegative ? flipOp(op) : op;

            let terms = [{c: curA, p: 2}, {c: curB, p: 1}, {c: curC, p: 0}];
            if (isUnordered) terms = terms.reverse();

            let qStr = "";
            let isFirst = true;
            for (let t of terms) {
                if (t.c !== 0) {
                    qStr += formatTerm(t.c, t.p, isFirst);
                    isFirst = false;
                }
            }
            return qStr + " " + curOp;
        }

        // Пул за системи линейни неравенства (Задача 1)
        const systemPool = [
            { q: "\\left| \\begin{array}{l} 3x + 5 > -4 \\\\ 2x - 5 > 7 \\end{array} \\right.", a: "x \\in (6; \\infty)" },
            { q: "\\left| \\begin{array}{l} 5x - 4 < 1 \\\\ 4x + 8 \\le 6 \\end{array} \\right.", a: "x \\in (-\\infty; -0.5]" },
            { q: "\\left| \\begin{array}{l} -2x + 5 \\le 3 \\\\ 3x + 16 < 7 \\end{array} \\right.", a: "\\emptyset" },
            { q: "\\left| \\begin{array}{l} 4x - 7 \\ge 1 \\\\ 5 - x > 2 \\end{array} \\right.", a: "x \\in [2; 3)" },
            { q: "\\left| \\begin{array}{l} 2x + 1 > 5 \\\\ 3x - 2 \\le 13 \\end{array} \\right.", a: "x \\in (2; 5]" },
            { q: "\\left| \\begin{array}{l} 3x - 1 \\le 8 \\\\ 4 - 2x < 10 \\end{array} \\right.", a: "x \\in (-3; 3]" }
        ];

        // Базови квадратни неравенства (Задача 2 и 3)
        const quadPool1 = [
            { a: 1, b: -7, c: 10, op: "\\le 0", ans: "x \\in [2; 5]" },
            { a: 1, b: -3, c: -4, op: "\\le 0", ans: "x \\in [-1; 4]" },
            { a: 1, b: -2, c: 8, op: "> 0", ans: "x \\in (-\\infty; \\infty)" },
            { a: 2, b: -4, c: 5, op: "> 0", ans: "x \\in (-\\infty; \\infty)" },
            { a: 1, b: 5, c: 6, op: "\\le 0", ans: "x \\in [-3; -2]" }
        ];

        const quadPool2 = [
            { a: 1, b: -8, c: 15, op: "> 0", ans: "x \\in (-\\infty; 3) \\cup (5; \\infty)" },
            { a: 2, b: -5, c: -3, op: "> 0", ans: "x \\in (-\\infty; -0.5) \\cup (3; \\infty)" },
            { a: 1, b: -3, c: 10, op: "< 0", ans: "\\emptyset" },
            { a: 1, b: -2, c: 6, op: "\\le 0", ans: "\\emptyset" },
            { a: 1, b: -2, c: -8, op: "\\ge 0", ans: "x \\in (-\\infty; -2] \\cup [4; \\infty)" }
        ];

        const pools = [
            systemPool, // Зад. 1
            [],         // Зад. 2 (Динамична)
            [],         // Зад. 3 (Динамична)
            [           // Зад. 4 - Произведение
                { q: "(x - 3)(2x + 5)^2(4 - x) \\ge 0", a: "x \\in [3; 4] \\cup \\{-2.5\\}" },
                { q: "(x - 1)(3x - 2)^2(5 - x) \\ge 0", a: "x \\in [1; 5] \\cup \\{2/3\\}" },
                { q: "(x - 2)(x + 4)^2(6 - x) \\ge 0", a: "x \\in [2; 6] \\cup \\{-4\\}" }
            ],
            [           // Зад. 5 - Биквадратни
                { q: "x^4 - 13x^2 + 36 < 0", a: "x \\in (-3; -2) \\cup (2; 3)" },
                { q: "x^4 - 10x^2 + 9 < 0", a: "x \\in (-3; -1) \\cup (1; 3)" },
                { q: "x^4 - 20x^2 + 64 < 0", a: "x \\in (-4; -2) \\cup (2; 4)" }
            ],
            [           // Зад. 6 - Дробни прости
                { q: "\\frac{3x - 1}{2 - x} \\ge 1", a: "x \\in [3/4; 2)" },
                { q: "\\frac{4x - 3}{3 - x} \\ge 1", a: "x \\in [1.2; 3)" },
                { q: "\\frac{3x - 2}{x + 4} \\ge 1", a: "x \\in (-\\infty; -4) \\cup [3; \\infty)" }
            ],
            [           // Зад. 7 - Дробни с разлагане
                { q: "\\frac{x^2 - 5x}{x + 2} \\le 0", a: "x \\in (-\\infty; -2) \\cup [0; 5]" },
                { q: "\\frac{x^2 - 16}{x - 1} \\ge 0", a: "x \\in [-4; 1) \\cup [4; \\infty)" },
                { q: "\\frac{2x - 3}{x^2 + 4x} \\le 0", a: "x \\in (-\\infty; -4) \\cup (0; 1.5]" }
            ],
            [           // Зад. 8 - Степени и повтарящи се корени
                { q: "\\frac{(x^2 - 4)(x + 1)^3}{x^2 - 2x + 1} \\le 0", a: "x \\in (-\\infty; -2] \\cup [-1; 1) \\cup (1; 2]" },
                { q: "\\frac{(x^2 - 4)(x - 1)}{x^2 - 3x + 2} \\ge 0", a: "x \\in [-2; 1) \\cup (1; 2) \\cup (2; \\infty)" },
                { q: "\\frac{(x^2 - 6x + 9)(x + 2)}{x - 1} \\le 0", a: "x \\in [-2; 1) \\cup \\{3\\}" }
            ],
            [           // Зад. 9 - Анализ на знаци и дискриминанта
                { q: "\\frac{-3x^2 + 10x - 8}{(x + 3)^4(x^2 - x + 3)} \\ge 0", a: "x \\in [4/3; 2]" },
                { q: "\\frac{-2x^2 + 9x - 4}{(x + 2)^4(x^2 + 2x + 5)} \\ge 0", a: "x \\in [0.5; 4]" },
                { q: "\\frac{-x^2 + 6x - 5}{(x - 2)^4(x^2 - 3x + 7)} \\ge 0", a: "x \\in [1; 2) \\cup (2; 5]" }
            ],
            [           // Зад. 10 - Общ знаменател (най-дългата)
                { q: "\\frac{3x^2 - 10x - 1}{x^2 - 3x + 2} < -2", a: "x \\in (0.2; 1) \\cup (2; 3)" },
                { q: "\\frac{3x^2 - 5x + 1}{x^2 - x - 2} \\le 2", a: "x \\in (-1; 2)" },
                { q: "\\frac{4x^2 - 10x + 7}{x^2 - 3x + 2} \\ge 3", a: "x \\in (-\\infty; 1) \\cup (2; \\infty)" }
            ],
            [           // Зад. 11 - Бонус (Полагане)
                { q: "\\left(\\frac{x+2}{x-1}\\right)^2 - 5\\left(\\frac{x+2}{x-1}\\right) + 6 \\le 0", a: "x \\in [2.5; 4]" },
                { q: "\\left(\\frac{x+1}{x-2}\\right)^2 - 4\\left(\\frac{x+1}{x-2}\\right) + 3 > 0", a: "x \\in (-\\infty; 2) \\cup (2; 3.5)" }
            ]
        ];

        // Точкуване: 3, 3, 3, 4, 4, 4, 4, 4(Зад.8), 5(Зад.9), 6(Зад.10), 0(Бонус)
        const pointsConfig = [3, 3, 3, 4, 4, 4, 4, 4, 5, 6, 0];

        function generateTest() {
            const numVariants = parseInt(document.getElementById('variant-count').value);
            const customSubtitle = document.getElementById('subtitle-input').value.trim();
            const includeBonus = document.getElementById('include-bonus').checked;
            const container = document.getElementById('test-container');
            
            let htmlContent = '';
            let answersHtml = `
                <div class="page-break"></div>
                <div class="header"><h1>Ключ с верни отговори</h1></div>
                <div class="answers-grid">
            `;

            // Подготовка на тестета за всяка задача
            let decks = pools.map(pool => pool.length > 0 ? shuffleArray([...pool]) : []);
            let quad1Deck = shuffleArray([...quadPool1]);
            let quad2Deck = shuffleArray([...quadPool2]);
            
            let deckIndices = new Array(pools.length).fill(0);
            let q1Idx = 0, q2Idx = 0;

            for (let v = 1; v <= numVariants; v++) {
                const subtitleHtml = customSubtitle ? `<h2 class="subtitle">${customSubtitle}</h2>` : '';
                htmlContent += `
                    <div class="header">
                        <h1>Рационални неравенства</h1>
                        ${subtitleHtml}
                        <p><strong>Вариант ${v}</strong> | Максимален брой точки: <strong>40</strong></p>
                    </div>
                `;
                
                htmlContent += '<div class="short-tasks-grid">';
                answersHtml += `<div class="variant-answers"><h3>Вариант ${v}</h3><ol>`;

                const activeCount = includeBonus ? pools.length : pools.length - 1;

                for (let i = 0; i < activeCount; i++) {
                    let task;
                    
                    if (i === 1 || i === 2) { // Динамични квадратни задачи
                        const isNeg = (i === 1) ? Math.random() > 0.5 : !(v % 2 === 0);
                        const isUnordered = (i === 1) ? Math.random() > 0.5 : (v % 2 !== 0);
                        
                        if (i === 1) {
                            if (q1Idx >= quad1Deck.length) { quad1Deck = shuffleArray([...quadPool1]); q1Idx = 0; }
                            const p = quad1Deck[q1Idx++];
                            task = { q: buildQuadratic(p.a, p.b, p.c, p.op, isNeg, isUnordered), a: p.ans };
                        } else {
                            if (q2Idx >= quad2Deck.length) { quad2Deck = shuffleArray([...quadPool2]); q2Idx = 0; }
                            const p = quad2Deck[q2Idx++];
                            task = { q: buildQuadratic(p.a, p.b, p.c, p.op, !isNeg, !isUnordered), a: p.ans };
                        }
                    } else {
                        if (deckIndices[i] >= decks[i].length) { decks[i] = shuffleArray([...pools[i]]); deckIndices[i] = 0; }
                        task = decks[i][deckIndices[i]++];
                    }

                    const isBonus = (i === pools.length - 1);
                    const pText = isBonus ? "Бонус (за отличен)" : `${pointsConfig[i]} т.`;
                    const pClass = isBonus ? "points bonus" : "points";

                    const taskHtml = `
                        <div class="task">
                            <div class="task-header">
                                <span class="task-title">Задача ${i + 1}.</span>
                                <span class="${pClass}">${pText}</span>
                            </div>
                            <div class="math-content">$$ ${task.q} $$</div>
                        </div>
                    `;

                    if (i < 4) htmlContent += taskHtml;
                    if (i === 3) htmlContent += '</div><div class="long-tasks-list">';
                    if (i >= 4) htmlContent += taskHtml;

                    answersHtml += `<li>$ ${task.a} $</li>`;
                }

                htmlContent += '</div><div class="page-break"></div>';
                answersHtml += '</ol></div>';
            }

            container.innerHTML = htmlContent + answersHtml + '</div>';
            renderMathInElement(container, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
        }

        function downloadPDF() {
            const element = document.getElementById('paper-content');
            const btn = document.getElementById('btn-pdf');
            btn.innerHTML = '⏳ Подготвяне...';
            btn.disabled = true;

            const opt = {
                margin: 10, filename: 'Kontrolna_Neravenstva.pdf',
                html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak: { mode: ['css', 'legacy'], avoid: '.task', before: '.page-break' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerHTML = '📄 Изтегли като PDF';
                btn.disabled = false;
            });
        }

        window.onload = () => setTimeout(generateTest, 300);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рационални неравенства - контролна работа</title>
    
    <!-- KaTeX за математически формули -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    
    <!-- Библиотека за PDF генериране -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary-color: #1a252f;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --accent-color: #c0392b;
            --bg-color: #e9ecef;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        select, button, input[type="text"] {
            padding: 10px 15px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            transition: 0.2s;
        }

        button { color: white; border: none; cursor: pointer; }
        #btn-generate { background-color: var(--secondary-color); }
        #btn-pdf { background-color: var(--accent-color); }
        button:hover { filter: brightness(1.1); }

        .paper {
            background: white;
            width: 100%;
            max-width: 820px;
            padding: 30px 45px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1a252f;
        }

        .header h1 { margin: 0; font-size: 22px; }
        .header h2.subtitle { margin: 5px 0; font-size: 18px; font-weight: normal; font-style: italic; color: #555; }

        .task-list { display: flex; flex-direction: column; gap: 12px; }
        .task { border-bottom: 1px dashed #ecf0f1; padding-bottom: 10px; page-break-inside: avoid; break-inside: avoid; }
        .task-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-weight: bold; }
        
        .points { color: var(--accent-color); font-size: 0.85em; }
        .points.bonus { color: var(--success-color); }
        
        .math-content { text-align: center; font-size: 1.3em; margin: 12px 0; }

        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .variant-answers { background: #f8f9fa; border: 1px solid #ddd; padding: 15px; border-radius: 6px; }

        .page-break { page-break-before: always; }
        .bonus-page-break { 
            page-break-before: always; 
            border-top: 2px solid #1a252f; 
            padding-top: 30px; 
            margin-top: 30px;
        }

        @media print {
            .controls { display: none; }
            .paper { box-shadow: none; max-width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="subtitle-input" value="контролна работа" placeholder="Подзаглавие">
        <select id="variant-count">
            <option value="1">1 Вариант</option>
            <option value="2" selected>2 Варианта</option>
            <option value="4">4 Варианта</option>
            <option value="6">6 Варианта</option>
        </select>
        
        <label style="cursor:pointer"><input type="checkbox" id="include-bonus" checked> Бонус</label>
        <label style="cursor:pointer"><input type="checkbox" id="bonus-new-page"> Бонус на нов лист</label>

        <button id="btn-generate" onclick="generateTest()">🔄 Генерирай</button>
        <button id="btn-pdf" onclick="downloadPDF()">📄 Изтегли PDF</button>
    </div>

    <div id="paper-content" class="paper">
        <div id="test-container"></div>
    </div>

    <script>
        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function flipOp(op) {
            const map = {"\\le 0": "\\ge 0", "\\ge 0": "\\le 0", "< 0": "> 0", "> 0": "< 0"};
            return map[op] || op;
        }

        function buildQuadratic(a_val, b_val, c_val, op) {
            const isNeg = Math.random() > 0.5;
            const curA = isNeg ? -a_val : a_val, curB = isNeg ? -b_val : b_val, curC = isNeg ? -c_val : c_val, curOp = isNeg ? flipOp(op) : op;
            let terms = [{v: curA, t: "x^2", p: 2}, {v: curB, t: "x", p: 1}, {v: curC, t: "", p: 0}];
            terms = shuffle(terms); 

            let str = "";
            terms.forEach((item, idx) => {
                if (item.v === 0) return;
                let val = Math.abs(item.v);
                let sign = item.v > 0 ? (idx === 0 ? "" : " + ") : (idx === 0 ? "-" : " - ");
                let coef = (val === 1 && item.p > 0) ? "" : val;
                str += sign + coef + item.t;
            });
            return str + " " + curOp;
        }

        const pools = {
            system: [
                { q: "\\left| \\begin{array}{l} 3x + 5 > -4 \\\\ 2x - 5 > 7 \\end{array} \\right.", ans: "x \\in (6; \\infty)" },
                { q: "\\left| \\begin{array}{l} 5x - 4 < 1 \\\\ 4x + 8 \\le 6 \\end{array} \\right.", ans: "x \\in (-\\infty; -0.5]" },
                { q: "\\left| \\begin{array}{l} 4x - 7 \\ge 1 \\\\ 5 - x > 2 \\end{array} \\right.", ans: "x \\in [2; 3)" },
                { q: "\\left| \\begin{array}{l} 2x + 1 > 5 \\\\ 3x - 2 \\le 13 \\end{array} \\right.", ans: "x \\in (2; 5]" },
                { q: "\\left| \\begin{array}{l} 3x - 1 \\le 8 \\\\ 4 - 2x < 10 \\end{array} \\right.", ans: "x \\in (-3; 3]" },
                { q: "\\left| \\begin{array}{l} x + 6 > 4 \\\\ 2x - 3 \\le 1 \\end{array} \\right.", ans: "x \\in (-2; 2]" },
                { q: "\\left| \\begin{array}{l} 10 - 2x \\ge 4 \\\\ 5x + 1 > 11 \\end{array} \\right.", ans: "x \\in (2; 3]" },
                { q: "\\left| \\begin{array}{l} 1 - x < 5 \\\\ 2x + 3 \\ge 7 \\end{array} \\right.", ans: "x \\in [2; \\infty)" },
                { q: "\\left| \\begin{array}{l} 4x + 2 > 14 \\\\ 6 - x \\ge 1 \\end{array} \\right.", ans: "x \\in (3; 5]" },
                { q: "\\left| \\begin{array}{l} \\frac{2x}{3} + 1 < 3 \\\\ 3x - 4 > 2 \\end{array} \\right.", ans: "x \\in (2; 3)" }
            ],
            quad: [
                { a: 1, b: -7, c: 10, op: "\\le 0", ans: "x \\in [2; 5]" },
                { a: 1, b: -3, c: -4, op: "\\le 0", ans: "x \\in [-1; 4]" },
                { a: 1, b: -8, c: 15, op: "> 0", ans: "x \\in (-\\infty; 3) \\cup (5; \\infty)" },
                { a: 1, b: -2, c: -8, op: "\\ge 0", ans: "x \\in (-\\infty; -2] \\cup [4; \\infty)" },
                { a: 1, b: 5, c: 6, op: "\\le 0", ans: "x \\in [-3; -2]" },
                { a: 1, b: 0, c: -25, op: "> 0", ans: "x \\in (-\\infty; -5) \\cup (5; \\infty)" },
                { a: 1, b: -4, c: 0, op: "\\le 0", ans: "x \\in [0; 4]" },
                { a: 1, b: 4, c: 5, op: "> 0", ans: "x \\in (-\\infty; \\infty)" },
                { a: 1, b: -6, c: 9, op: "< 0", ans: "\\emptyset" },
                { a: 2, b: -5, c: 2, op: "\\le 0", ans: "x \\in [0.5; 2]" }
            ],
            product_nonstrict: [
                { q: "(x - 3)(2x + 5)^2(4 - x) \\ge 0", ans: "x \\in [3; 4] \\cup \\{-2.5\\}" },
                { q: "(x - 1)(3x - 2)^2(5 - x) \\ge 0", ans: "x \\in [1; 5] \\cup \\{2/3\\}" },
                { q: "(x + 2)(x - 4)^2(6 - x) \\le 0", ans: "x \\in (-\\infty; -2] \\cup [6; \\infty) \\cup \\{4\\}" },
                { q: "(x + 1)(2x - 7)^2(3 - x) \\ge 0", ans: "x \\in [-1; 3] \\cup \\{3.5\\}" },
                { q: "x^2(x - 5)(x + 2) \\le 0", ans: "x \\in [-2; 5]" }
            ],
            product_strict: [
                { q: "(x - 3)(2x + 5)^2(4 - x) > 0", ans: "x \\in (3; 4)" },
                { q: "(x - 1)(3x - 2)^2(5 - x) < 0", ans: "x \\in (-\\infty; 1) \\cup (5; \\infty)" },
                { q: "(x + 2)(x - 4)^2(6 - x) > 0", ans: "x \\in (-2; 4) \\cup (4; 6)" },
                { q: "(x + 1)(2x - 7)^2(3 - x) < 0", ans: "x \\in (-\\infty; -1) \\cup (3; \\infty) \\setminus \\{3.5\\}" },
                { q: "x^2(x - 5)(x + 2) > 0", ans: "x \\in (-\\infty; -2) \\cup (5; \\infty)" }
            ],
            biquad: [
                { q: "x^4 - 13x^2 + 36 < 0", ans: "x \\in (-3; -2) \\cup (2; 3)" },
                { q: "x^4 - 10x^2 + 9 < 0", ans: "x \\in (-3; -1) \\cup (1; 3)" },
                { q: "x^4 - 20x^2 + 64 < 0", ans: "x \\in (-4; -2) \\cup (2; 4)" },
                { q: "x^4 - 25x^2 + 144 < 0", ans: "x \\in (-4; -3) \\cup (3; 4)" },
                { q: "x^4 - 5x^2 + 4 \\le 0", ans: "x \\in [-2; -1] \\cup [1; 2]" },
                { q: "x^4 - 17x^2 + 16 \\ge 0", ans: "x \\in (-\\infty; -4] \\cup [-1; 1] \\cup [4; \\infty)" },
                { q: "x^4 - 26x^2 + 25 < 0", ans: "x \\in (-5; -1) \\cup (1; 5)" },
                { q: "x^4 - 34x^2 + 225 \\le 0", ans: "x \\in [-5; -3] \\cup [3; 5]" },
                { q: "x^4 - 40x^2 + 144 < 0", ans: "x \\in (-6; -2) \\cup (2; 6)" },
                { q: "x^4 - 41x^2 + 400 < 0", ans: "x \\in (-5; -4) \\cup (4; 5)" }
            ],
            fracSimple: [
                { q: "\\frac{3x - 1}{2 - x} \\ge 1", ans: "x \\in [3/4; 2)" },
                { q: "\\frac{4x - 3}{3 - x} \\ge 1", ans: "x \\in [1.2; 3)" },
                { q: "\\frac{3x - 2}{x + 4} \\ge 1", ans: "x \\in (-\\infty; -4) \\cup [3; \\infty)" },
                { q: "\\frac{x + 5}{x - 1} < 2", ans: "x \\in (-\\infty; 1) \\cup (7; \\infty)" },
                { q: "\\frac{2x + 3}{x - 4} \\le 1", ans: "x \\in [-7; 4)" },
                { q: "\\frac{5x + 2}{x + 2} \\ge 3", ans: "x \\in (-\\infty; -2) \\cup [2; \\infty)" },
                { q: "\\frac{x - 6}{x + 1} > 2", ans: "x \\in (-8; -1)" },
                { q: "\\frac{3x + 1}{x - 2} \\le 2", ans: "x \\in [-5; 2)" },
                { q: "\\frac{4x - 2}{x + 3} < 3", ans: "x \\in (-3; 11)" },
                { q: "\\frac{x + 10}{2x - 1} \\le 1", ans: "x \\in (-\\infty; 0.5) \\cup [11; \\infty)" }
            ],
            fracFactor: [
                { q: "\\frac{x^2 - 4}{x^2 - 5x + 6} \\le 0", ans: "x \\in [-2; 2) \\cup (2; 3)" },
                { q: "\\frac{x^2 - 9}{x^2 - x - 6} \\ge 0", ans: "x \\in (-\\infty; -3] \\cup (-2; 3) \\cup (3; \\infty)" },
                { q: "\\frac{x^2 + 2x}{x^2 + 5x + 6} \\le 0", ans: "x \\in (-3; -2) \\cup (-2; 0]" },
                { q: "\\frac{x^2 - 1}{x^2 + 3x + 2} \\ge 0", ans: "x \\in (-\\infty; -2) \\cup (-1; 1] \\cup \\{-1 \\text{ изкл.}\\}" },
                { q: "\\frac{x^2 - 4x + 4}{x^2 - x - 2} \\le 0", ans: "x \\in (-1; 2)" },
                { q: "\\frac{x^2 + 6x + 9}{x^2 + 2x - 3} \\ge 0", ans: "x \\in (-\\infty; -3) \\cup (-3; -3) \\cup (1; \\infty) \\cup \\{-3\\}" },
                { q: "\\frac{2x^2 - 4x}{x^2 - x - 2} \\ge 0", ans: "x \\in (-\\infty; -1) \\cup [0; 2) \\cup (2; \\infty)" },
                { q: "\\frac{x^2 - 16}{x^2 - 2x - 8} \\le 0", ans: "x \\in [-4; -2) \\cup (4; 4) \\text{ изкл.}" },
                { q: "\\frac{3x^2 + 3x}{x^2 + 4x + 3} \\ge 0", ans: "x \\in (-\\infty; -3) \\cup [0; \\infty) \\setminus \\{-1\\}" },
                { q: "\\frac{x^2 - 25}{x^2 - 4x - 5} \\le 0", ans: "x \\in [-5; -1)" }
            ],
            fracPowers: [
                { q: "\\frac{(x^2 - 4)(x + 1)^3}{x^2 - 2x + 1} \\le 0", ans: "x \\in (-\\infty; -2] \\cup [-1; 1) \\cup (1; 2]" },
                { q: "\\frac{(x^2 - 6x + 9)(x + 2)}{x - 1} \\le 0", ans: "x \\in [-2; 1) \\cup \\{3\\}" },
                { q: "\\frac{(x^2 - 16)(x + 2)^3}{x^2 - 2x + 1} \\le 0", ans: "x \\in (-\\infty; -4] \\cup [-2; 1) \\cup (1; 4]" },
                { q: "\\frac{x - 5}{(x + 3)^2(x - 1)} \\le 0", ans: "x \\in (1; 5] \\cup \\{-3\\}" },
                { q: "\\frac{(x+2)^2(x-3)}{x+4} \\le 0", ans: "x \\in (-4; 3]" },
                { q: "\\frac{(x^2-1)(x+5)^4}{x-2} \\ge 0", ans: "x \\in [-1; 1] \\cup (2; \\infty) \\cup \\{-5\\}" },
                { q: "\\frac{x^2-9}{(x-3)(x+2)} \\ge 0", ans: "x \\in (-\\infty; -3] \\cup (-2; 3) \\cup (3; \\infty)" },
                { q: "\\frac{(x+1)^3(x-4)^2}{x-2} \\le 0", ans: "x \\in [-1; 2) \\cup \\{4\\}" },
                { q: "\\frac{(x-2)^4(x+3)}{x^2-1} \\ge 0", ans: "x \\in [-3; -1) \\cup (1; \\infty)" },
                { q: "\\frac{x^2-4x+4}{(x+1)(x-2)} \\le 0", ans: "x \\in (-\\infty; -1)" }
            ],
            fracSigns: [
                { q: "\\frac{-x^2 + 6x - 5}{(x - 2)^4(x^2 - 3x + 7)} \\ge 0", ans: "x \\in [1; 2) \\cup (2; 5]" },
                { q: "\\frac{-3x^2 + 10x - 8}{(x + 3)^4(x^2 - x + 3)} \\ge 0", ans: "x \\in [4/3; 2]" },
                { q: "\\frac{x^2 - 4x + 3}{(x - 2)^2(x^2 + x + 1)} \\le 0", ans: "x \\in [1; 2) \\cup (2; 3]" },
                { q: "\\frac{-2x^2 + 7x - 3}{(x + 1)^2(x^2 + x + 1)} > 0", ans: "x \\in (0.5; 3)" },
                { q: "\\frac{x^2 - 6x + 8}{(x - 5)^6(x^2 + 2x + 5)} \\ge 0", ans: "x \\in (-\\infty; 2] \\cup [4; 5) \\cup (5; \\infty)" },
                { q: "\\frac{-x^2 + 4x - 3}{(x + 2)^2(x^2 - 2x + 5)} \\ge 0", ans: "x \\in [1; 3]" },
                { q: "\\frac{3x^2 - 11x + 6}{(x - 1)^4(x^2 + 4)} < 0", ans: "x \\in (2/3; 1) \\cup (1; 3)" },
                { q: "\\frac{-2x^2 + 9x - 4}{(x + 3)^2(x^2 + 2x + 2)} \\ge 0", ans: "x \\in [0.5; 4]" },
                { q: "\\frac{x^2 - 5x + 6}{(x + 1)^4(x^2 - x + 1)} \\le 0", ans: "x \\in [2; 3]" },
                { q: "\\frac{-4x^2 + 13x - 3}{(x - 2)^2(x^2 + 3)} \\ge 0", ans: "x \\in [0.25; 2) \\cup (2; 3]" }
            ],
            fracCommon: [
                { q: "\\frac{3x^2 - 10x - 1}{x^2 - 3x + 2} < -2", ans: "x \\in (0.2; 1) \\cup (2; 3)" },
                { q: "\\frac{4x^2 - 10x + 7}{x^2 - 3x + 2} \\ge 3", ans: "x \\in (-\\infty; 1) \\cup (2; \\infty)" },
                { q: "\\frac{3x^2 - 7x + 2}{x^2 - x - 2} \\le 2", ans: "x \\in (-1; 2) \\cup (2; 3]" },
                { q: "\\frac{x^2 - 3x + 2}{x^2 - 1} \\le 2", ans: "x \\in (-\\infty; -4] \\cup (-1; 1) \\cup (1; \\infty)" },
                { q: "\\frac{x^2 + 2x + 1}{x^2 - 1} \\le 2", ans: "x \\in (-\\infty; -1) \\cup (-1; 1) \\cup [3; \\infty)" },
                { q: "\\frac{2x^2 - x - 3}{x^2 - 4} \\ge 1", ans: "x \\in (-\\infty; -2) \\cup [-1; 1] \\cup (2; \\infty)" },
                { q: "\\frac{x^2 - 4x + 3}{x^2 - 9} < 1", ans: "x \\in (-\\infty; -3) \\cup (1.5; 3) \\cup (3; \\infty)" },
                { q: "\\frac{2x^2 + 5x + 2}{x^2 - 4} \\le 2", ans: "x \\in (-\\infty; -2) \\cup (-2; 2)" },
                { q: "\\frac{x^2 - 5x + 6}{x^2 - 4} \\le 1", ans: "x \\in (-2; 2) \\cup (2; \\infty)" },
                { q: "\\frac{3x^2 - 2x - 1}{x^2 - 1} < 2", ans: "x \\in (-1; 1)" }
            ],
            bonus: [
                { q: "\\left(\\frac{x+2}{x-1}\\right)^2 - 5\\left(\\frac{x+2}{x-1}\\right) + 6 \\le 0", ans: "x \\in [2.5; 4]" },
                { q: "\\left(\\frac{x+1}{x-2}\\right)^2 - 4\\left(\\frac{x+1}{x-2}\\right) + 3 > 0", ans: "x \\in (-\\infty; 2) \\cup (2; 3.5)" },
                { q: "\\left(\\frac{x-1}{x+2}\\right)^2 - 3\\left(\\frac{x-1}{x+2}\\right) + 2 \\le 0", ans: "x \\in [-5; -2) \\cup (-2; -1.5]" },
                { q: "(x^2 - 5x + 7)^2 - (x - 2)(x - 3) - 1 \\le 0", ans: "x \\in [2; 3]" },
                { q: "x + \\frac{1}{x} \\le -2.5", ans: "x \\in (-\\infty; -2] \\cup [-0.5; 0)" }
            ]
        };

        const points = [3, 4, 4, 4, 4, 4, 4, 6, 7];
        const keysOrder = ['system', 'quad', 'product', 'biquad', 'fracSimple', 'fracFactor', 'fracPowers', 'fracSigns', 'fracCommon'];

        function generateTest() {
            const numVariants = parseInt(document.getElementById('variant-count').value);
            const sub = document.getElementById('subtitle-input').value;
            const incB = document.getElementById('include-bonus').checked;
            const bNP = document.getElementById('bonus-new-page').checked;
            const cont = document.getElementById('test-container');
            
            let decks = {};
            let cursors = {};
            
            // Инициализация на всички броячи и тестета
            Object.keys(pools).forEach(k => {
                decks[k] = shuffle(pools[k]);
                cursors[k] = 0;
            });
            // Ръчно добавяне на 'product' в броячите, тъй като се обработва динамично
            cursors['product'] = 0;

            let htmlContent = '', ansHtml = `<div class="page-break"></div><div class="header"><h1>Ключ с отговори</h1></div><div class="answers-grid">`;

            for (let v = 1; v <= numVariants; v++) {
                htmlContent += `<div class="header"><h1>Рационални неравенства</h1>${sub ? `<h2 class="subtitle">${sub}</h2>` : ''}<p><strong>Вариант ${v}</strong> | Макс. точки: 40</p></div><div class="task-list">`;
                ansHtml += `<div class="variant-answers"><h3>Вариант ${v}</h3><ol>`;

                keysOrder.forEach((key, i) => {
                    let taskData;
                    
                    if (key === 'product') {
                        const targetPool = (v % 2 !== 0) ? pools.product_nonstrict : pools.product_strict;
                        if (cursors[key] >= targetPool.length) cursors[key] = 0;
                        taskData = targetPool[cursors[key]++];
                    } else {
                        if (cursors[key] >= decks[key].length) {
                            decks[key] = shuffle(pools[key]);
                            cursors[key] = 0;
                        }
                        taskData = decks[key][cursors[key]++];
                    }

                    if (!taskData) return;

                    let qDisplay = taskData.q;
                    if(key === 'quad') {
                        qDisplay = buildQuadratic(taskData.a, taskData.b, taskData.c, taskData.op);
                    }

                    htmlContent += `
                        <div class="task">
                            <div class="task-header">
                                <span>Задача ${i + 1}.</span>
                                <span class="points">${points[i]} т.</span>
                            </div>
                            <div class="math-content">$$ ${qDisplay} $$</div>
                        </div>`;
                    ansHtml += `<li>$ ${taskData.ans} $</li>`;
                });

                if(incB) {
                    if (cursors.bonus >= decks.bonus.length) { decks.bonus = shuffle(pools.bonus); cursors.bonus = 0; }
                    let bData = decks.bonus[cursors.bonus++];
                    const bonusClass = bNP ? "bonus-page-break" : "";
                    htmlContent += `
                        <div class="task ${bonusClass}">
                            <div class="task-header">
                                <span>Задача 10.</span>
                                <span class="points bonus">Бонус (за отличен)</span>
                            </div>
                            <div class="math-content">$$ ${bData.q} $$</div>
                        </div>`;
                    ansHtml += `<li>$ ${bData.ans} $</li>`;
                }

                htmlContent += `</div><div class="page-break"></div>`;
                ansHtml += `</ol></div>`;
            }

            cont.innerHTML = htmlContent + ansHtml + `</div>`;
            renderMathInElement(cont, { delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}] });
        }

        function downloadPDF() {
            const element = document.getElementById('paper-content');
            const opt = { 
                margin: 10, 
                filename: 'Kontrolna_Neravenstva.pdf', 
                html2canvas: { scale: 2 }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }, 
                pagebreak: { mode: ['css', 'legacy'] } 
            };
            html2pdf().set(opt).from(element).save();
        }

        window.onload = () => setTimeout(generateTest, 300);
    </script>
</body>
</html>

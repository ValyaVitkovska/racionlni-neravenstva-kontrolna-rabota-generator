<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рационални неравенства - контролна работа</title>

    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- html2pdf -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary-color: #1a252f;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --accent-color: #c0392b;
            --bg-color: #e9ecef;
            --line-color: #dfe6e9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        select, button, input[type="text"] {
            padding: 10px 16px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            transition: 0.2s;
        }

        select, input[type="text"] {
            background-color: #f1f2f6;
            color: #2f3640;
            border: 1px solid #dcdde1;
        }

        select {
            font-weight: 600;
            cursor: pointer;
        }

        input[type="text"] {
            width: 220px;
        }

        button {
            color: white;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        #btn-generate { background-color: var(--secondary-color); }
        #btn-pdf { background-color: var(--accent-color); }

        button:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        .paper {
            background: white;
            width: 100%;
            max-width: 820px;
            padding: 30px 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 5px;
        }

        .header {
            text-align: center;
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--primary-color);
        }

        .header h1 {
            margin: 0 0 6px 0;
            font-size: 24px;
            color: var(--primary-color);
        }

        .header h2.subtitle {
            margin: 0 0 10px 0;
            color: #555;
            font-size: 18px;
            font-weight: 500;
            font-style: italic;
        }

        .header p {
            margin: 4px 0;
            color: #555;
            font-size: 15px;
        }

        .student-line {
            display: flex;
            justify-content: space-between;
            gap: 18px;
            margin: 12px 0 18px 0;
            font-size: 15px;
            flex-wrap: wrap;
        }

        .student-line span {
            min-width: 180px;
        }

        .short-tasks-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 30px;
            margin-bottom: 15px;
        }

        .long-tasks-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task {
            display: block;
            border-bottom: 1px dashed var(--line-color);
            padding-bottom: 8px;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .task-title {
            font-weight: 700;
            color: var(--primary-color);
        }

        .points {
            font-weight: 700;
            color: var(--accent-color);
            font-size: 0.95em;
            white-space: nowrap;
        }

        .points.bonus {
            color: var(--success-color);
        }

        .math-content {
            text-align: center;
            font-size: 1.12em;
            margin: 5px 0;
            min-height: 35px;
            break-inside: avoid;
            page-break-inside: avoid;
            overflow-x: auto;
            overflow-y: hidden;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .variant-answers {
            background: #f8f9fa;
            border: 1px solid #dcdde1;
            padding: 15px;
            border-radius: 6px;
            break-inside: avoid;
            page-break-inside: avoid;
        }

        .variant-answers h3 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
            text-align: center;
            border-bottom: 1px solid #ddd;
            padding-bottom: 6px;
        }

        .variant-answers ol {
            margin: 0;
            padding-left: 22px;
            font-size: 0.95em;
        }

        .variant-answers li {
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .page-break {
            page-break-before: always;
            break-before: page;
            margin-top: 40px;
            border-top: 2px dashed #bdc3c7;
            padding-top: 20px;
        }

        .loading-text {
            text-align: center;
            color: #666;
        }

        @media (max-width: 760px) {
            .paper {
                padding: 22px 18px;
            }

            .short-tasks-grid {
                grid-template-columns: 1fr;
            }

            .student-line {
                flex-direction: column;
                gap: 10px;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .controls {
                display: none;
            }

            .paper {
                box-shadow: none;
                border: none;
                padding: 0;
                max-width: 100%;
                border-radius: 0;
            }

            .task,
            .variant-answers,
            .math-content {
                page-break-inside: avoid;
                break-inside: avoid;
            }

            .page-break {
                border-top: none;
                margin-top: 0;
                padding-top: 0;
            }
        }
    </style>
</head>
<body>

    <div class="controls">
        <label for="subtitle-input" style="font-weight:700;">Подзаглавие:</label>
        <input type="text" id="subtitle-input" value="контролна работа" placeholder="напр. тест, класно...">

        <label for="variant-count" style="font-weight:700;">Брой варианти:</label>
        <select id="variant-count">
            <option value="1">1 вариант</option>
            <option value="2" selected>2 варианта</option>
            <option value="4">4 варианта</option>
            <option value="6">6 варианта</option>
        </select>

        <label style="font-weight:700; display:flex; align-items:center; cursor:pointer; color:var(--primary-color);">
            <input type="checkbox" id="include-bonus" checked style="margin-right:6px; width:18px; height:18px; cursor:pointer;">
            Включи задача 10
        </label>

        <button id="btn-generate">🔄 Генерирай</button>
        <button id="btn-pdf">📄 Изтегли като PDF</button>
    </div>

    <div id="paper-content" class="paper">
        <div id="test-container">
            <p class="loading-text">Зареждане...</p>
        </div>
    </div>

    <script>
        const pointsConfig = [3, 3, 4, 4, 4, 4, 5, 7, 6, 0];

        const quadPool1 = [
            { a: 1, b: -7, c: 10, op: "\\le 0", ans: "x \\in [2; 5]" },
            { a: 1, b: -3, c: -4, op: "\\le 0", ans: "x \\in [-1; 4]" },
            { a: 1, b: -2, c: 8, op: "> 0", ans: "x \\in (-\\infty; \\infty)" },
            { a: 2, b: -4, c: 5, op: "> 0", ans: "x \\in (-\\infty; \\infty)" },
            { a: 1, b: 5, c: 6, op: "\\le 0", ans: "x \\in [-3; -2]" }
        ];

        const quadPool2 = [
            { a: 1, b: -8, c: 15, op: "> 0", ans: "x \\in (-\\infty; 3) \\cup (5; \\infty)" },
            { a: 2, b: -5, c: -3, op: "> 0", ans: "x \\in \\left(-\\infty; -\\frac{1}{2}\\right) \\cup (3; \\infty)" },
            { a: 1, b: -3, c: 10, op: "< 0", ans: "x \\in \\emptyset" },
            { a: 1, b: -2, c: 6, op: "\\le 0", ans: "x \\in \\emptyset" },
            { a: 1, b: -2, c: -8, op: "\\ge 0", ans: "x \\in (-\\infty; -2] \\cup [4; \\infty)" }
        ];

        const pools = [
            [],
            [],
            [
                { q: "(x - 3)(2x + 5)^2(4 - x) \\ge 0", a: "x \\in [3; 4] \\cup \\{-2.5\\}" },
                { q: "(x - 1)(3x - 2)^2(5 - x) \\ge 0", a: "x \\in [1; 5] \\cup \\left\\{\\frac{2}{3}\\right\\}" },
                { q: "(x - 2)(x + 4)^2(6 - x) \\ge 0", a: "x \\in [2; 6] \\cup \\{-4\\}" },
                { q: "(x + 1)(2x - 7)^2(3 - x) \\ge 0", a: "x \\in [-1; 3] \\cup \\{3.5\\}" }
            ],
            [
                { q: "x^4 - 13x^2 + 36 < 0", a: "x \\in (-3; -2) \\cup (2; 3)" },
                { q: "x^4 - 10x^2 + 9 < 0", a: "x \\in (-3; -1) \\cup (1; 3)" },
                { q: "x^4 - 20x^2 + 64 < 0", a: "x \\in (-4; -2) \\cup (2; 4)" },
                { q: "x^4 - 25x^2 + 144 < 0", a: "x \\in (-4; -3) \\cup (3; 4)" }
            ],
            [
                { q: "\\frac{3x - 1}{2 - x} \\ge 1", a: "x \\in \\left[\\frac{3}{4}; 2\\right)" },
                { q: "\\frac{4x - 3}{3 - x} \\ge 1", a: "x \\in [1.2; 3)" },
                { q: "\\frac{5x - 2}{4 - x} \\ge 1", a: "x \\in [1; 4)" },
                { q: "\\frac{3x - 2}{x + 4} \\ge 1", a: "x \\in (-\\infty; -4) \\cup [3; \\infty)" }
            ],
            [
                { q: "\\frac{x^2 - 5x}{x + 2} \\le 0", a: "x \\in (-\\infty; -2) \\cup [0; 5]" },
                { q: "\\frac{x^2 - 16}{x - 1} \\ge 0", a: "x \\in [-4; 1) \\cup [4; \\infty)" },
                { q: "\\frac{2x - 3}{x^2 + 4x} \\le 0", a: "x \\in (-\\infty; -4) \\cup (0; 1.5]" },
                { q: "\\frac{x + 3}{x^2 - 4} \\ge 0", a: "x \\in [-3; -2) \\cup (2; \\infty)" },
                { q: "\\frac{3x - x^2}{x + 1} \\ge 0", a: "x \\in (-\\infty; -1) \\cup [0; 3]" },
                { q: "\\frac{4x^2 - 1}{x - 3} \\le 0", a: "x \\in (-\\infty; -0.5] \\cup [0.5; 3)" }
            ],
            [
                { q: "\\frac{(x^2 - 4)(x + 1)^3}{x^2 - 2x + 1} \\le 0", a: "x \\in (-\\infty; -2] \\cup [-1; 1) \\cup (1; 2]" },
                { q: "\\frac{(x^2 - 4)(x - 1)}{x^2 - 3x + 2} \\ge 0", a: "x \\in [-2; 1) \\cup (1; 2) \\cup (2; \\infty)" },
                { q: "\\frac{x^2 - 9}{x^2 - 3x} \\ge 0", a: "x \\in (-\\infty; -3] \\cup (0; 3) \\cup (3; \\infty)" },
                { q: "\\frac{(x^2 - 6x + 9)(x + 2)}{x - 1} \\le 0", a: "x \\in [-2; 1) \\cup \\{3\\}" },
                { q: "\\frac{x^2 - x - 12}{x^2 - 4} \\le 0", a: "x \\in [-3; -2) \\cup (2; 4]" },
                { q: "\\frac{x^2 - 25}{(x + 1)(x^2 - 10x + 25)} \\le 0", a: "x \\in (-\\infty; -5] \\cup (-1; 5)" }
            ],
            [
                { q: "\\frac{x + 1}{x + 3} - \\frac{2x^2 - 5}{9 - x^2} > \\frac{x - 2}{x - 3}", a: "x \\in (-\\infty; -3) \\cup \\left(-\\frac{1}{2}; 2\\right) \\cup (3; \\infty)" },
                { q: "\\frac{x + 2}{x + 4} - \\frac{2x^2 + 10}{16 - x^2} > \\frac{x - 1}{x - 4}", a: "x \\in (-\\infty; -4) \\cup (2; 3) \\cup (4; \\infty)" },
                { q: "\\frac{x + 4}{x + 5} - \\frac{x^2 + 1}{25 - x^2} > \\frac{x - 3}{x - 5}", a: "x \\in (-\\infty; -5) \\cup (-1; 4) \\cup (5; \\infty)" },
                { q: "\\frac{x + 2}{x + 1} - \\frac{x^2 - 3}{1 - x^2} > \\frac{x + 1}{x - 1}", a: "x \\in (-\\infty; -2) \\cup (-1; 1) \\cup (3; \\infty)" }
            ],
            [
                { q: "\\frac{-3x^2 + 10x - 8}{(x + 3)^4(x^2 - x + 3)} \\ge 0", a: "x \\in \\left[\\frac{4}{3}; 2\\right]" },
                { q: "\\frac{-2x^2 + 9x - 4}{(x + 2)^4(x^2 + 2x + 5)} \\ge 0", a: "x \\in \\left[\\frac{1}{2}; 4\\right]" },
                { q: "\\frac{-x^2 + 6x - 5}{(x - 2)^4(x^2 - 3x + 7)} \\ge 0", a: "x \\in [1; 2) \\cup (2; 5]" },
                { q: "\\frac{-4x^2 + 12x - 5}{(x - 1)^4(x^2 + x + 2)} \\ge 0", a: "x \\in \\left[\\frac{1}{2}; 1\\right) \\cup (1; 2.5]" }
            ],
            [
                { q: "\\left(\\frac{x+2}{x-1}\\right)^2 - 5\\left(\\frac{x+2}{x-1}\\right) + 6 \\le 0", a: "x \\in [2.5; 4]" },
                { q: "\\left(\\frac{x+1}{x-2}\\right)^2 - 4\\left(\\frac{x+1}{x-2}\\right) + 3 > 0", a: "x \\in (-\\infty; 2) \\cup (2; 3.5)" },
                { q: "\\left(\\frac{x-1}{x+2}\\right)^2 - 6\\left(\\frac{x-1}{x+2}\\right) + 8 < 0", a: "x \\in (-5; -3)" },
                { q: "\\left(\\frac{2x+1}{x-1}\\right)^2 - 5\\left(\\frac{2x+1}{x-1}\\right) + 4 \\ge 0", a: "x \\in [-2; 1) \\cup (1; 2.5]" }
            ]
        ];

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function flipOp(op) {
            if (op === "\\le 0") return "\\ge 0";
            if (op === "\\ge 0") return "\\le 0";
            if (op === "< 0") return "> 0";
            if (op === "> 0") return "< 0";
            return op;
        }

        function formatTerm(c, p, isFirst) {
            if (c === 0) return "";

            let sign = "";
            if (c < 0) {
                sign = isFirst ? "-" : " - ";
            } else if (!isFirst) {
                sign = " + ";
            }

            const absC = Math.abs(c);
            const numStr = (absC === 1 && p > 0) ? "" : absC.toString();
            const varStr = p === 2 ? "x^2" : (p === 1 ? "x" : "");

            return sign + numStr + varStr;
        }

        function buildQuadratic(a, b, c, op, isNegative, isUnordered) {
            let curA = isNegative ? -a : a;
            let curB = isNegative ? -b : b;
            let curC = isNegative ? -c : c;
            let curOp = isNegative ? flipOp(op) : op;

            let terms = [
                { c: curA, p: 2 },
                { c: curB, p: 1 },
                { c: curC, p: 0 }
            ];

            if (isUnordered) {
                terms = terms.reverse();
            }

            let qStr = "";
            let isFirst = true;

            for (const t of terms) {
                if (t.c !== 0) {
                    qStr += formatTerm(t.c, t.p, isFirst);
                    isFirst = false;
                }
            }

            return `${qStr} ${curOp}`;
        }

        function escapeHtml(text) {
            return text.replace(/[&<>"']/g, function(char) {
                const map = {
                    "&": "&amp;",
                    "<": "&lt;",
                    ">": "&gt;",
                    '"': "&quot;",
                    "'": "&#39;"
                };
                return map[char];
            });
        }

        function getPdfFileName() {
            const subtitle = document.getElementById("subtitle-input").value.trim();
            const cleanSubtitle = subtitle
                ? subtitle.replace(/[^\p{L}\p{N}\s-]/gu, "").trim().replace(/\s+/g, "_")
                : "kontrolna_rabota";

            return `Racionalni_neravenstva_${cleanSubtitle}.pdf`;
        }

        function renderMath(container) {
            if (typeof renderMathInElement !== "function") return;

            renderMathInElement(container, {
                delimiters: [
                    { left: "$$", right: "$$", display: true },
                    { left: "$", right: "$", display: false }
                ],
                throwOnError: false,
                strict: false
            });
        }

        function generateTest() {
            const numVariants = parseInt(document.getElementById("variant-count").value, 10);
            const customSubtitle = document.getElementById("subtitle-input").value.trim();
            const includeBonus = document.getElementById("include-bonus").checked;
            const container = document.getElementById("test-container");

            let htmlContent = "";
            let answersHtml = `
                <div class="page-break"></div>
                <div class="header">
                    <h1>Ключ с верни отговори</h1>
                    <p>Рационални неравенства</p>
                </div>
                <div class="answers-grid">
            `;

            let quadDeck1 = shuffleArray(quadPool1);
            let quadDeck2 = shuffleArray(quadPool2);
            let otherDecks = pools.map(pool => shuffleArray(pool));

            let idxQuad1 = 0;
            let idxQuad2 = 0;
            let idxOther = new Array(pools.length).fill(0);

            for (let v = 1; v <= numVariants; v++) {
                const safeSubtitle = customSubtitle ? escapeHtml(customSubtitle) : "";
                const subtitleHtml = safeSubtitle ? `<h2 class="subtitle">${safeSubtitle}</h2>` : "";

                htmlContent += `
                    <div class="header">
                        <h1>Рационални неравенства</h1>
                        ${subtitleHtml}
                        <p><strong>Вариант ${v}</strong> | Максимален брой точки: <strong>40</strong> | Време: <strong>40 минути</strong></p>
                    </div>

                    <div class="student-line">
                        <span><strong>Име:</strong> ____________________</span>
                        <span><strong>Клас:</strong> __________</span>
                        <span><strong>Дата:</strong> __________</span>
                    </div>
                `;

                htmlContent += `<div class="short-tasks-grid">`;
                answersHtml += `<div class="variant-answers"><h3>Вариант ${v}</h3><ol>`;

                const t1Neg = Math.random() > 0.5;
                const t1Unord = Math.random() > 0.5;
                const t2Neg = !t1Neg;
                const t2Unord = !t1Unord;

                const activePoolsCount = includeBonus ? 10 : 9;

                for (let index = 0; index < activePoolsCount; index++) {
                    const isBonus = index === 9;
                    let randomTask;

                    if (index === 0) {
                        if (idxQuad1 >= quadDeck1.length) {
                            quadDeck1 = shuffleArray(quadPool1);
                            idxQuad1 = 0;
                        }
                        const pick = quadDeck1[idxQuad1++];
                        randomTask = {
                            q: buildQuadratic(pick.a, pick.b, pick.c, pick.op, t1Neg, t1Unord),
                            a: pick.ans
                        };
                    } else if (index === 1) {
                        if (idxQuad2 >= quadDeck2.length) {
                            quadDeck2 = shuffleArray(quadPool2);
                            idxQuad2 = 0;
                        }
                        const pick = quadDeck2[idxQuad2++];
                        randomTask = {
                            q: buildQuadratic(pick.a, pick.b, pick.c, pick.op, t2Neg, t2Unord),
                            a: pick.ans
                        };
                    } else {
                        if (idxOther[index] >= otherDecks[index].length) {
                            otherDecks[index] = shuffleArray(pools[index]);
                            idxOther[index] = 0;
                        }
                        randomTask = otherDecks[index][idxOther[index]++];
                    }

                    const pointsText = isBonus ? "Бонус" : `${pointsConfig[index]} т.`;
                    const pointsClass = isBonus ? "points bonus" : "points";

                    const taskHtml = `
                        <div class="task">
                            <div class="task-header">
                                <span class="task-title">Задача ${index + 1}.</span>
                                <span class="${pointsClass}">${pointsText}</span>
                            </div>
                            <div class="math-content">$$ ${randomTask.q} $$</div>
                        </div>
                    `;

                    if (index < 4) {
                        htmlContent += taskHtml;
                    }

                    if (index === 3) {
                        htmlContent += `</div><div class="long-tasks-list">`;
                    }

                    if (index >= 4) {
                        htmlContent += taskHtml;
                    }

                    answersHtml += `<li>$ ${randomTask.a} $</li>`;
                }

                htmlContent += `</div>`;
                answersHtml += `</ol></div>`;

                if (v < numVariants) {
                    htmlContent += `<div class="page-break"></div>`;
                }
            }

            answersHtml += `</div>`;
            container.innerHTML = htmlContent + answersHtml;
            renderMath(container);
        }

        function downloadPDF() {
            const element = document.getElementById("paper-content");
            const btn = document.getElementById("btn-pdf");
            const oldText = btn.innerHTML;

            const opt = {
                margin: 10,
                filename: getPdfFileName(),
                image: { type: "jpeg", quality: 1 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
                pagebreak: {
                    mode: ["css", "legacy"],
                    avoid: [".task", ".variant-answers", ".math-content"],
                    before: ".page-break"
                }
            };

            btn.innerHTML = "⏳ Подготвяне на PDF...";
            btn.disabled = true;

            html2pdf().set(opt).from(element).save()
                .then(() => {
                    btn.innerHTML = oldText;
                    btn.disabled = false;
                })
                .catch((err) => {
                    console.error("Грешка при създаване на PDF:", err);
                    btn.innerHTML = "❌ Възникна грешка";
                    setTimeout(() => {
                        btn.innerHTML = oldText;
                        btn.disabled = false;
                    }, 2000);
                });
        }

        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById("btn-generate").addEventListener("click", generateTest);
            document.getElementById("btn-pdf").addEventListener("click", downloadPDF);

            setTimeout(generateTest, 300);
        });
    </script>
</body>
</html>
